<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terminal</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <style>
    :root { --bg: #1C1C1F; --fg: #F4F4F5; }
    html, body { margin: 0; height: 100%; background: var(--bg); }
    #term { position: absolute; inset: 10px; }
    #status {
      position: absolute; top: 8px; right: 12px; z-index: 5;
      font: 11px ui-sans-serif, system-ui, sans-serif; color: #A1A1AA;
      background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 999px;
    }
    .ok { color: #34D399; }
    .err { color: #F87171; }
  </style>
</head>
<body>
  <div id="status">…</div>
  <div id="term"></div>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var dark = (params.get('theme') || 'dark') !== 'light';
      var statusEl = document.getElementById('status');

      var themeDark = { background: '#1C1C1F', foreground: '#F4F4F5', cursor: '#34D399', selectionBackground: 'rgba(52,211,153,0.3)' };
      var themeLight = { background: '#FFFFFF', foreground: '#0B0B0F', cursor: '#059669', selectionBackground: 'rgba(16,185,129,0.2)' };
      document.documentElement.style.setProperty('--bg', dark ? '#1C1C1F' : '#FFFFFF');

      var term = new Terminal({
        fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
        fontSize: 13, cursorBlink: true,
        theme: dark ? themeDark : themeLight,
      });
      var fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById('term'));
      try { fit.fit(); } catch (e) {}

      var proto = location.protocol === 'https:' ? 'wss' : 'ws';
      var ws = new WebSocket(proto + '://' + location.host + '/app/terminal/ws');

      function setStatus(text, cls) { statusEl.textContent = text; statusEl.className = cls || ''; }
      setStatus('verbinde…');

      ws.onopen = function () {
        setStatus('verbunden', 'ok');
        // Startet die Shell serverseitig (erste resize-Nachricht)
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        term.focus();
      };
      ws.onmessage = function (ev) { term.write(typeof ev.data === 'string' ? ev.data : ''); };
      ws.onclose = function () { setStatus('getrennt', 'err'); term.write('\r\n\x1b[31m[Verbindung getrennt]\x1b[0m\r\n'); };
      ws.onerror = function () { setStatus('Fehler', 'err'); };

      term.onData(function (d) { if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'data', data: d })); });

      function doResize() {
        try { fit.fit(); } catch (e) {}
        if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
      window.addEventListener('resize', doResize);
    })();
  </script>
</body>
</html>
