<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard</title>
<style>
  :root{
    --bg:#1C1C1F; --surface:#26262B; --sunken:#18181B; --fg:#F4F4F5; --muted:#A1A1AA;
    --faint:#52525B; --border:rgba(255,255,255,.08); --accent:#34D399; --track:rgba(255,255,255,.08);
  }
  :root[data-theme="light"]{ --bg:#F7F7F8; --surface:#FFF; --sunken:#F1F1F3; --fg:#0B0B0F; --muted:#52525B; --faint:#A1A1AA; --border:rgba(0,0,0,.08); --accent:#10B981; --track:rgba(0,0,0,.07); }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
  .card h3{margin:0 0 4px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
  .sub{font-size:12px;color:var(--faint);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .donut-wrap{display:flex;align-items:center;gap:16px}
  .donut{position:relative;width:120px;height:120px;flex-shrink:0}
  .donut svg{transform:rotate(-90deg)}
  .donut .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut .val b{font-size:24px;font-weight:700;color:var(--accent)}
  .donut .val span{font-size:11px;color:var(--muted)}
  .legend{font-size:13px;line-height:1.8;color:var(--muted);min-width:0}
  .legend b{color:var(--fg)}
  .cores{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:12px}
  .core{height:26px;border-radius:4px;background:var(--track);position:relative;overflow:hidden}
  .core i{position:absolute;bottom:0;left:0;right:0;background:var(--accent);transition:height .4s}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
  .row b{color:var(--fg)}
  .bar{height:6px;border-radius:99px;background:var(--track);overflow:hidden;margin-top:4px}
  .bar i{display:block;height:100%;background:var(--accent)}
  #err{color:#F87171;font-size:13px;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div id="err"></div>
<div class="grid" id="grid"></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme', (params.get('theme')||'dark')==='light'?'light':'dark');
  var grid=document.getElementById('grid'), errEl=document.getElementById('err');

  function fmtBytes(n){ if(!n&&n!==0)return '–'; var u=['B','KB','MB','GB','TB'],i=0; while(n>=1024&&i<u.length-1){n/=1024;i++;} return n.toFixed(n<10&&i>0?1:0)+' '+u[i]; }
  function fmtRate(n){ return fmtBytes(n)+'/s'; }
  function donut(pct,label,sub){
    var r=52,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(100,pct))/100);
    return '<div class="donut"><svg width="120" height="120" viewBox="0 0 120 120">'
      +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--track)" stroke-width="10"/>'
      +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"/>'
      +'</svg><div class="val"><b>'+Math.round(pct)+'%</b><span>'+label+'</span></div></div>'
      +(sub?'<div class="legend">'+sub+'</div>':'');
  }
  function card(title,sub,body){ return '<div class="card"><h3>'+title+'</h3>'+(sub?'<div class="sub">'+sub+'</div>':'')+body+'</div>'; }

  function render(s){
    var html='';
    // CPU
    var cores=(s.cpu.perCore||[]).map(function(v){return '<div class="core"><i style="height:'+v+'%"></i></div>';}).join('');
    html+=card('Prozessor', (s.os.cpuBrand||'')+' · '+s.os.cores+' Kerne',
      '<div class="donut-wrap">'+donut(s.cpu.usage,'Last',
        '<div class="row"><span>Load (1m)</span><b>'+(s.os.load?s.os.load[0].toFixed(2):'–')+'</b></div>')+'</div>'
      +'<div class="cores">'+cores+'</div>');
    // RAM
    var m=s.memory;
    html+=card('Arbeitsspeicher', fmtBytes(m.total),
      '<div class="donut-wrap">'+donut(m.percent,'RAM',
        '<div class="row"><span>Belegt</span><b>'+fmtBytes(m.used)+'</b></div>'
        +'<div class="row"><span>Frei</span><b>'+fmtBytes(m.breakdown.free)+'</b></div>')+'</div>');
    // GPU
    (s.gpu||[]).forEach(function(g){
      html+=card('Grafik', g.name,
        '<div class="donut-wrap">'+donut(g.utilizationPct||0,'GPU',
          g.vramTotalMb?('<div class="row"><span>VRAM</span><b>'+g.vramUsedMb+' / '+g.vramTotalMb+' MB</b></div>'):'')+'</div>');
    });
    // Disks
    (s.disk||[]).forEach(function(d){
      html+=card('Datenträger', d.mount+' ('+d.fs+')',
        '<div class="donut-wrap">'+donut(d.percent,'belegt',
          '<div class="row"><span>Belegt</span><b>'+fmtBytes(d.used)+'</b></div>'
          +'<div class="row"><span>Frei</span><b>'+fmtBytes(d.available)+'</b></div>'
          +'<div class="row"><span>Größe</span><b>'+fmtBytes(d.size)+'</b></div>')+'</div>');
    });
    // Network
    var net=(s.network||[]).map(function(n){
      return '<div class="row"><span>'+n.iface+' ↓</span><b>'+fmtRate(n.rx_sec)+'</b></div>'
        +'<div class="row"><span>'+n.iface+' ↑</span><b>'+fmtRate(n.tx_sec)+'</b></div>';
    }).join('');
    if(net) html+=card('Netzwerk','', net);
    // System
    var up=s.os.uptime, d=Math.floor(up/86400), h=Math.floor((up%86400)/3600), mi=Math.floor((up%3600)/60);
    html+=card('System', s.os.hostname,
      '<div class="row"><span>Distribution</span><b>'+s.os.distro+'</b></div>'
      +'<div class="row"><span>Kernel</span><b>'+s.os.kernel+' ('+s.os.arch+')</b></div>'
      +'<div class="row"><span>Uptime</span><b>'+(d?d+'d ':'')+h+'h '+mi+'m</b></div>');
    grid.innerHTML=html;
  }

  function tick(){
    fetch('/app/dashboard/api/stats',{credentials:'include'}).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
    }).then(function(s){ errEl.style.display='none'; render(s); })
    .catch(function(e){ errEl.style.display='block'; errEl.textContent='Fehler beim Laden der Stats: '+e.message; });
  }
  tick(); setInterval(tick,2000);
})();
</script>
</body>
</html>
