<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Taskmanager</title>
<link rel="stylesheet" href="/plugin-kit.css" />
<style>
  .bar{display:inline-block;width:46px;height:6px;border-radius:99px;background:var(--color-border);vertical-align:middle;margin-right:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--color-accent)}
  .search{width:240px}
  th{position:sticky;top:0;background:var(--color-surface)}
</style>
</head>
<body>
<div class="tabs"><button class="tab on" id="t-proc">Prozesse</button><button class="tab" id="t-svc">Dienste</button></div>
<div class="msg" id="msg"></div>
<input class="search" id="search" placeholder="Filtern…" style="margin-bottom:12px" />
<div class="card" style="padding:0"><div class="scroll" id="content"><div class="muted" style="padding:24px">Lade…</div></div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var content=document.getElementById('content'),msgEl=document.getElementById('msg'),search=document.getElementById('search');
  var tab='proc',timer=null,lastProc=[],lastSvc=[];
  function msg(m){ msgEl.className='msg'+(m?' show err':''); msgEl.textContent=m||''; }
  function fmtBytes(n){var u=['B','KB','MB','GB'],i=0;while(n>=1024&&i<3){n/=1024;i++;}return n.toFixed(n<10&&i>0?1:0)+' '+u[i];}
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function api(path,opts){return fetch('/app/taskmanager/api/'+path,Object.assign({credentials:'include'},opts||{}));}

  function renderProc(){
    var q=search.value.toLowerCase();
    var rows=lastProc.filter(function(p){return !q||(p.name+' '+p.command+' '+p.user+' '+p.pid).toLowerCase().indexOf(q)>=0;});
    var h='<table><thead><tr><th>PID</th><th>Name</th><th>Benutzer</th><th class="num">CPU %</th><th class="num">RAM</th><th>Kommando</th><th></th></tr></thead><tbody>';
    rows.forEach(function(p){
      h+='<tr><td class="num mono">'+p.pid+'</td><td><b>'+esc(p.name)+'</b></td><td>'+esc(p.user)+'</td>'
        +'<td class="num"><span class="bar"><i style="width:'+Math.min(100,p.cpu)+'%"></i></span>'+p.cpu.toFixed(1)+'</td>'
        +'<td class="num mono">'+fmtBytes(p.memRss)+'</td><td class="wrap muted" style="max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.command)+'</td>'
        +'<td class="num"><button class="btn xs danger" data-kill="'+p.pid+'">Beenden</button></td></tr>';
    });
    h+='</tbody></table>'; content.innerHTML=h;
    content.querySelectorAll('[data-kill]').forEach(function(b){ b.onclick=function(){ b.disabled=true;
      api('processes/'+b.getAttribute('data-kill')+'/kill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signal:'TERM'})})
        .then(function(r){return r.json();}).then(function(d){ if(d.error)msg(d.error); else load(); }).catch(function(e){msg(e.message);}); }; });
  }
  function renderSvc(){
    var q=search.value.toLowerCase();
    var rows=lastSvc.filter(function(s){return !q||(s.name+' '+s.description).toLowerCase().indexOf(q)>=0;});
    var h='<table><thead><tr><th>Dienst</th><th>Status</th><th>Beschreibung</th><th></th></tr></thead><tbody>';
    rows.forEach(function(s){ var active=s.active==='active';
      h+='<tr><td><b>'+esc(s.name)+'</b></td><td><span class="pill '+(active?'on':'off')+'">'+esc(s.sub||s.active)+'</span></td>'
        +'<td class="wrap muted">'+esc(s.description)+'</td>'
        +'<td class="num">'+(active?'<button class="btn xs" data-act="stop" data-svc="'+esc(s.name)+'">Stop</button> <button class="btn xs" data-act="restart" data-svc="'+esc(s.name)+'">Restart</button>':'<button class="btn xs" data-act="start" data-svc="'+esc(s.name)+'">Start</button>')+'</td></tr>';
    });
    h+='</tbody></table>'; content.innerHTML=h;
    content.querySelectorAll('[data-svc]').forEach(function(b){ b.onclick=function(){ b.disabled=true;
      api('services/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service:b.getAttribute('data-svc'),action:b.getAttribute('data-act')})})
        .then(function(r){return r.json();}).then(function(d){ if(d.error)msg(d.error); else load(); }).catch(function(e){msg(e.message);}); }; });
  }
  function load(){
    if(tab==='proc') api('processes').then(function(r){return r.json();}).then(function(d){ if(d.error)throw new Error(d.error); msg(''); lastProc=d.processes||[]; renderProc(); }).catch(function(e){msg(e.message);});
    else api('services').then(function(r){return r.json();}).then(function(d){ if(d.error)throw new Error(d.error); msg(''); lastSvc=d.services||[]; renderSvc(); }).catch(function(e){msg(e.message);});
  }
  function setTab(t){ tab=t;
    document.getElementById('t-proc').className='tab'+(t==='proc'?' on':'');
    document.getElementById('t-svc').className='tab'+(t==='svc'?' on':'');
    if(timer)clearInterval(timer); load(); if(t==='proc')timer=setInterval(load,3000);
  }
  document.getElementById('t-proc').onclick=function(){setTab('proc');};
  document.getElementById('t-svc').onclick=function(){setTab('svc');};
  search.oninput=function(){ tab==='proc'?renderProc():renderSvc(); };
  setTab('proc');
})();
</script>
</body>
</html>
