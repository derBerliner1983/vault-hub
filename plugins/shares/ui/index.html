<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SMB-Freigaben</title>
<link rel="stylesheet" href="/plugin-kit.css" />
</head>
<body>
<div class="msg" id="msg"></div>
<div id="app"><div class="muted">Lade…</div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var app=document.getElementById('app'),msgEl=document.getElementById('msg');
  var FOLDER='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg>';
  function msg(t,err){ msgEl.className='msg'+(t?' show '+(err?'err':'ok'):''); msgEl.textContent=t||''; }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var API='/app/shares/api';
  function j(url,opts){ return fetch(url,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().catch(function(){return{};}).then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function POST(p,b){ return j(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}); }
  function render(d){
    if(!d.available){ app.innerHTML='<div class="card"><div class="card-header"><span class="card-icon">'+FOLDER+'</span> Samba</div><div>'+esc(d.message||'Samba nicht installiert')+'</div><div class="hint">Samba installieren (z. B. Paketverwaltung: <span class="mono">apt install samba</span>), dann neu laden.</div></div>'; return; }
    var h='<div class="card"><div class="card-header"><span class="card-icon">'+FOLDER+'</span> Samba-Dienst<span class="spacer"></span>'
      +'<span class="pill '+(d.running?'on':'off')+'">'+(d.running?'läuft':'gestoppt')+'</span> <span class="pill '+(d.firewallOpen?'on':'off')+'">Firewall '+(d.firewallOpen?'offen (LAN)':'zu')+'</span></div>'
      +'<div class="form"><button class="btn sm" data-svc="start">Start</button><button class="btn sm" data-svc="stop">Stop</button><button class="btn sm" data-svc="restart">Restart</button></div></div>';
    h+='<div class="card"><div class="card-header"><span class="card-icon">'+FOLDER+'</span> Freigaben</div>';
    if((d.shares||[]).length){
      h+='<table><thead><tr><th>Name</th><th>Pfad</th><th>Zugriff</th><th>Gast</th><th>Sichtbar</th><th></th></tr></thead><tbody>';
      d.shares.forEach(function(s){ h+='<tr><td><b>'+esc(s.name)+'</b></td><td class="mono muted">'+esc(s.path)+'</td><td>'+(s.readOnly?'nur lesen':'schreiben')+'</td><td>'+(s.guestOk?'ja':'nein')+'</td><td>'+(s.browseable?'ja':'nein')+'</td><td class="num"><button class="btn xs danger" data-del="'+esc(s.name)+'">Löschen</button></td></tr>'; });
      h+='</tbody></table>';
    } else h+='<div class="muted">Noch keine Freigaben.</div>';
    h+='<div class="form" style="margin-top:12px"><input id="s-name" placeholder="Name" style="width:120px"/><input id="s-path" placeholder="/srv/freigabe" class="grow"/>'
      +'<label style="display:flex;align-items:center;gap:6px;color:var(--color-muted)"><input type="checkbox" id="s-ro" style="width:auto"/> nur lesen</label>'
      +'<label style="display:flex;align-items:center;gap:6px;color:var(--color-muted)"><input type="checkbox" id="s-guest" style="width:auto"/> Gast erlaubt</label>'
      +'<button class="btn primary sm" id="s-add">+ Freigabe</button></div></div>';
    h+='<div class="card"><div class="card-header"><span class="card-icon">'+FOLDER+'</span> SMB-Benutzer</div><div class="hint" style="margin:0 0 10px">Muss bereits als Linux-Benutzer existieren (siehe Benutzer-Plugin).</div>'
      +'<div class="form"><input id="u-name" placeholder="Benutzername" style="width:150px"/><input id="u-pass" type="password" placeholder="SMB-Passwort"/><button class="btn primary sm" id="u-add">Setzen</button></div></div>';
    app.innerHTML=h; wire();
  }
  function wire(){
    document.querySelectorAll('[data-svc]').forEach(function(b){ b.onclick=function(){ POST('/service',{action:b.getAttribute('data-svc')}).then(function(){msg('Dienst: '+b.getAttribute('data-svc'));load();}).catch(function(e){msg(e.message,true);}); }; });
    document.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ if(!confirm('Freigabe "'+b.getAttribute('data-del')+'" löschen?'))return; j(API+'/'+encodeURIComponent(b.getAttribute('data-del')),{method:'DELETE'}).then(function(){msg('Gelöscht.');load();}).catch(function(e){msg(e.message,true);}); }; });
    var add=document.getElementById('s-add'); if(add)add.onclick=function(){ var name=document.getElementById('s-name').value.trim(),path=document.getElementById('s-path').value.trim(); if(!name||!path){msg('Name und Pfad nötig.',true);return;} POST('',{name:name,path:path,readOnly:document.getElementById('s-ro').checked,guestOk:document.getElementById('s-guest').checked,browseable:true}).then(function(){msg('Freigabe angelegt.');load();}).catch(function(e){msg(e.message,true);}); };
    var ua=document.getElementById('u-add'); if(ua)ua.onclick=function(){ var u=document.getElementById('u-name').value.trim(),p=document.getElementById('u-pass').value; if(!u||!p){msg('Benutzer und Passwort nötig.',true);return;} POST('/user',{username:u,password:p}).then(function(){msg('SMB-Benutzer gesetzt.');document.getElementById('u-pass').value='';}).catch(function(e){msg(e.message,true);}); };
  }
  function load(){ j(API+'/status').then(render).catch(function(e){ msg(e.message,true); }); }
  load();
})();
</script>
</body>
</html>
