<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Datei-Manager</title>
<link rel="stylesheet" href="/plugin-kit.css" />
<style>.path{flex:1;min-width:180px;font-family:var(--font-mono)}.dir{color:var(--color-accent);font-weight:600;cursor:pointer}.fname{cursor:pointer}textarea{min-height:340px}</style>
</head>
<body>
<div class="msg" id="msg"></div>
<div class="toolbar">
  <button class="btn" id="up">↑ Auf</button>
  <input class="path" id="path" value="/" />
  <button class="btn" id="go">Öffnen</button>
  <button class="btn" id="mkdir">+ Ordner</button>
  <label class="btn" style="cursor:pointer">Hochladen<input type="file" id="upload" multiple style="display:none"/></label>
</div>
<div class="card" style="padding:0"><div id="list"><div class="muted" style="padding:24px">Lade…</div></div></div>
<div class="overlay" id="overlay"><div class="modal"><div class="mh"><b id="ed-title" class="mono"></b><button class="btn sm" id="ed-x">Schließen</button></div><textarea id="ed-content"></textarea><div style="padding:0 16px 14px;display:flex;gap:8px;justify-content:flex-end"><button class="btn primary" id="ed-save">Speichern</button></div></div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var msgEl=document.getElementById('msg'),listEl=document.getElementById('list'),pathEl=document.getElementById('path'),
      overlay=document.getElementById('overlay'),edTitle=document.getElementById('ed-title'),edContent=document.getElementById('ed-content');
  var cur='/',parent=null,editPath=null;
  var DL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>';
  var REN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
  var TR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  var FOLDER='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;vertical-align:-2px"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>';
  var FILE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;vertical-align:-2px"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>';
  function msg(t,err){ msgEl.className='msg'+(t?' show '+(err?'err':'ok'):''); msgEl.textContent=t||''; }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtBytes(n){if(n<1024)return n+' B';var u=['KB','MB','GB','TB'],i=-1;do{n/=1024;i++;}while(n>=1024&&i<3);return n.toFixed(1)+' '+u[i];}
  var API='/app/filemanager/api';
  function j(url,opts){ return fetch(url,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().catch(function(){return{};}).then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function q(p){ return encodeURIComponent(p); }
  function load(p){
    j(API+'/list?path='+q(p)).then(function(d){
      cur=d.path; parent=d.parent; pathEl.value=cur;
      var h='<table><thead><tr><th>Name</th><th class="num">Größe</th><th>Rechte</th><th>Besitzer</th><th>Geändert</th><th></th></tr></thead><tbody>';
      d.entries.forEach(function(e){
        h+='<tr><td class="fname '+(e.isDir?'dir':'')+'" data-nav="'+(e.isDir?esc(e.path):'')+'" data-edit="'+(!e.isDir?esc(e.path):'')+'">'+(e.isDir?FOLDER:FILE)+' '+esc(e.name)+'</td>'
          +'<td class="num mono">'+(e.isDir?'':fmtBytes(e.size))+'</td><td class="mono muted">'+esc(e.permissions)+'</td><td class="mono muted">'+esc(e.owner||'')+'</td>'
          +'<td class="mono muted">'+esc((e.mtime||'').slice(0,16).replace('T',' '))+'</td>'
          +'<td class="num">'+(!e.isDir?'<a class="btn xs icon" href="'+API+'/download?path='+q(e.path)+'" title="Download">'+DL+'</a> ':'')
          +'<button class="btn xs icon" data-ren="'+esc(e.path)+'" data-name="'+esc(e.name)+'" title="Umbenennen">'+REN+'</button> '
          +'<button class="btn xs icon danger" data-del="'+esc(e.path)+'" data-name="'+esc(e.name)+'" title="Löschen">'+TR+'</button></td></tr>';
      });
      h+='</tbody></table>'; if(!d.entries.length)h='<div class="muted" style="padding:24px">Leeres Verzeichnis</div>';
      listEl.innerHTML=h; wire();
    }).catch(function(e){ msg(e.message,true); });
  }
  function wire(){
    listEl.querySelectorAll('[data-nav]').forEach(function(el){ if(el.getAttribute('data-nav')) el.onclick=function(){ load(el.getAttribute('data-nav')); }; });
    listEl.querySelectorAll('[data-edit]').forEach(function(el){ if(el.getAttribute('data-edit')) el.onclick=function(){ openEditor(el.getAttribute('data-edit')); }; });
    listEl.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ if(!confirm('"'+b.getAttribute('data-name')+'" löschen?'))return; j(API+'?path='+q(b.getAttribute('data-del')),{method:'DELETE'}).then(function(){msg('Gelöscht.');load(cur);}).catch(function(e){msg(e.message,true);}); }; });
    listEl.querySelectorAll('[data-ren]').forEach(function(b){ b.onclick=function(){ var old=b.getAttribute('data-ren'),name=b.getAttribute('data-name'); var nn=prompt('Neuer Name:',name); if(!nn||nn===name)return; var to=cur.replace(/\/$/,'')+'/'+nn; j(API+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:old,to:to})}).then(function(){msg('Umbenannt.');load(cur);}).catch(function(e){msg(e.message,true);}); }; });
  }
  function openEditor(p){ j(API+'/read?path='+q(p)).then(function(d){ editPath=p; edTitle.textContent=p; edContent.value=d.content; overlay.className='overlay show'; }).catch(function(e){ msg(e.message,true); }); }
  document.getElementById('ed-x').onclick=function(){ overlay.className='overlay'; };
  document.getElementById('ed-save').onclick=function(){ j(API+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:editPath,content:edContent.value})}).then(function(){msg('Gespeichert.');overlay.className='overlay';}).catch(function(e){msg(e.message,true);}); };
  document.getElementById('up').onclick=function(){ if(parent)load(parent); };
  document.getElementById('go').onclick=function(){ load(pathEl.value.trim()||'/'); };
  pathEl.addEventListener('keydown',function(e){ if(e.key==='Enter')load(pathEl.value.trim()||'/'); });
  document.getElementById('mkdir').onclick=function(){ var n=prompt('Ordnername:'); if(!n)return; var p=cur.replace(/\/$/,'')+'/'+n; j(API+'/mkdir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p})}).then(function(){msg('Ordner erstellt.');load(cur);}).catch(function(e){msg(e.message,true);}); };
  document.getElementById('upload').onchange=function(){ var files=this.files; if(!files.length)return; var fd=new FormData(); for(var i=0;i<files.length;i++)fd.append('file',files[i]); msg('Lade hoch…'); fetch(API+'/upload?path='+q(cur),{method:'POST',credentials:'include',body:fd}).then(function(r){return r.json();}).then(function(d){ if(d.error)throw new Error(d.error); msg((d.saved||[]).length+' Datei(en) hochgeladen.'); load(cur); }).catch(function(e){msg(e.message,true);}); this.value=''; };
  load('/');
})();
</script>
</body>
</html>
