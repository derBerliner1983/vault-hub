<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Virenschutz</title>
<link rel="stylesheet" href="/plugin-kit.css" />
</head>
<body>
<div class="msg" id="msg"></div>
<div id="app"><div class="muted">Lade…</div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var app=document.getElementById('app'),msgEl=document.getElementById('msg'),busy=false,pollTimer=null;
  function msg(text,kind){ msgEl.className='msg'+(text?' show '+(kind==='err'?'err':'ok'):''); msgEl.textContent=text||''; }
  function api(path,opts){ return fetch('/app/antivirus/api/'+path,Object.assign({credentials:'include'},opts||{})); }
  function post(path,body){ return api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined}).then(function(r){return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  var ICON_SHIELD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>';
  var ICON_SCAN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" x2="17" y1="12" y2="12"/></svg>';

  function render(s){
    var h='';
    if(!s.installed){
      h+='<div class="card"><div class="card-header"><span class="card-icon">'+ICON_SHIELD+'</span> ClamAV</div>'
        +'<div class="row between"><div>ClamAV ist nicht installiert.</div><button class="btn primary" id="install">Installieren</button></div>'
        +'<div class="hint">Installiert die Pakete clamav + clamav-daemon.</div></div>';
    }else{
      var age=s.defsAgeDays;
      h+='<div class="card"><div class="card-header"><span class="card-icon">'+ICON_SHIELD+'</span> Status</div>'
        +'<div class="row between"><span class="k">Version</span><b>'+esc((s.version||'').split(' ')[0]||'installiert')+'</b></div>'
        +'<div class="row between"><span class="k">Signaturen</span><span><b>'+(age==null?'unbekannt':(age+' Tage alt'))+'</b> <button class="btn sm" id="update" style="margin-left:8px">Aktualisieren</button></span></div>'
        +'<div class="row between"><span class="k">Scan-Daemon (clamav-daemon)</span><span><span class="pill '+(s.daemonActive?'on':'off')+'">'+(s.daemonActive?'aktiv':'inaktiv')+'</span> <button class="btn sm" data-svc="daemon" data-en="'+(!s.daemonActive)+'">'+(s.daemonActive?'Deaktivieren':'Aktivieren')+'</button></span></div>'
        +'<div class="row between"><span class="k">Auto-Updates (clamav-freshclam)</span><span><span class="pill '+(s.freshclamActive?'on':'off')+'">'+(s.freshclamActive?'aktiv':'inaktiv')+'</span> <button class="btn sm" data-svc="freshclam" data-en="'+(!s.freshclamActive)+'">'+(s.freshclamActive?'Deaktivieren':'Aktivieren')+'</button></span></div>'
        +'</div>';
      var sc=s.scan||{};
      h+='<div class="card"><div class="card-header"><span class="card-icon">'+ICON_SCAN+'</span> Scan</div>';
      if(sc.running){
        h+='<div class="row between"><div>Scan läuft: <b>'+esc(sc.path)+'</b></div><span class="pill on">läuft…</span></div>'
          +'<div class="hint">Geprüfte Dateien: '+(sc.scanned||0)+' · Funde: '+(sc.infectedCount||0)+'</div>';
      }else{
        h+='<div class="form"><input id="scanpath" placeholder="/home" value="/home" class="grow"/>'
          +'<input id="scanexcl" placeholder="Ausschluss, z. B. /home/x/cache" class="grow"/>'
          +'<button class="btn primary" id="scan">Scan starten</button></div>';
        if(sc.finishedAt){
          h+='<div class="row between" style="margin-top:10px"><span class="k">Letzter Scan</span><b>'+esc(sc.path||'')+' · '+(sc.scanned||0)+' Dateien</b></div>';
          if(sc.error) h+='<div style="color:var(--color-error)">'+esc(sc.error)+'</div>';
          if((sc.infected||[]).length){
            h+='<table><thead><tr><th>Datei</th><th>Bedrohung</th></tr></thead><tbody>';
            sc.infected.forEach(function(i){ h+='<tr><td class="mono">'+esc(i.file)+'</td><td style="color:var(--color-error)">'+esc(i.virus)+'</td></tr>'; });
            h+='</tbody></table>';
          }else h+='<div class="row" style="color:var(--color-accent)">Keine Bedrohungen gefunden ✓</div>';
        }
      }
      h+='</div>';
    }
    app.innerHTML=h; wire();
  }
  function wire(){
    var el;
    if(el=document.getElementById('install')) el.onclick=function(){ act(el,post('install'),'ClamAV installiert.'); };
    if(el=document.getElementById('update')) el.onclick=function(){ act(el,post('update'),'Signaturen aktualisiert.'); };
    if(el=document.getElementById('scan')) el.onclick=function(){
      act(el,post('scan',{path:document.getElementById('scanpath').value.trim(),exclude:document.getElementById('scanexcl').value.trim()}),'Scan gestartet.');
    };
    document.querySelectorAll('[data-svc]').forEach(function(b){ b.onclick=function(){ act(b,post('daemon',{service:b.getAttribute('data-svc'),enable:b.getAttribute('data-en')==='true'}),'Dienst aktualisiert.'); }; });
  }
  function act(btn,p,okMsg){ if(busy)return; busy=true; btn.disabled=true; msg(''); p.then(function(){ msg(okMsg); }).catch(function(e){ msg(e.message,'err'); }).finally(function(){ busy=false; load(); }); }
  function load(){ api('status').then(function(r){return r.json();}).then(function(s){ render(s); if(pollTimer)clearInterval(pollTimer); if(s.scan&&s.scan.running) pollTimer=setInterval(load,2000); }).catch(function(e){ msg('Fehler: '+e.message,'err'); }); }
  load();
})();
</script>
</body>
</html>
