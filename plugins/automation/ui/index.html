<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Automatisierung</title>
<link rel="stylesheet" href="/plugin-kit.css" />
</head>
<body>
<div class="msg" id="msg"></div>
<div class="card">
  <div class="card-header"><span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span> Neue Aufgabe</div>
  <div class="form">
    <select id="preset" style="width:190px"><option value="">Vorlage wählen…</option><option value="0 3 * * *">Täglich 03:00</option><option value="0 * * * *">Stündlich</option><option value="*/15 * * * *">Alle 15 Min</option><option value="0 4 * * 0">Sonntags 04:00</option><option value="0 2 1 * *">Monatlich (1., 02:00)</option></select>
    <input id="sched" class="mono" placeholder="m h dom mon dow" style="width:150px"/>
    <input id="cmd" class="mono grow" placeholder="Befehl, z. B. /usr/bin/apt-get update"/>
    <input id="cmt" placeholder="Kommentar (optional)" style="width:170px"/>
    <button class="btn primary" id="add">Hinzufügen</button>
  </div>
  <div class="hint">Format: Minute Stunde Tag Monat Wochentag · Beispiel <span class="mono">30 2 * * 1-5</span> = Mo–Fr 02:30</div>
</div>
<div class="card"><div class="card-header">Geplante Aufgaben (crontab)</div><div id="list"><div class="muted">Lade…</div></div></div>
<div class="card"><div class="card-header">Erweitert: crontab direkt bearbeiten</div><textarea id="raw"></textarea><div style="margin-top:8px"><button class="btn" id="save-raw">Rohtext speichern</button></div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var msgEl=document.getElementById('msg');
  function msg(t,err){ msgEl.className='msg'+(t?' show '+(err?'err':'ok'):''); msgEl.textContent=t||''; }
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  var API='/app/automation/api';
  function j(url,opts){ return fetch(url,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().catch(function(){return{};}).then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function load(){ j(API+'/jobs').then(function(d){
    document.getElementById('raw').value=d.raw||'';
    var jobs=d.jobs||[];
    if(!jobs.length){ document.getElementById('list').innerHTML='<div class="muted">Noch keine geplanten Aufgaben.</div>'; return; }
    var h='<table><thead><tr><th>Zeitplan</th><th>Befehl</th><th>Kommentar</th><th></th></tr></thead><tbody>';
    jobs.forEach(function(job){ h+='<tr><td class="mono">'+esc(job.schedule)+'</td><td class="mono">'+esc(job.command)+'</td><td class="muted">'+esc(job.comment)+'</td><td class="num"><button class="btn xs danger" data-del="'+job.id+'">Löschen</button></td></tr>'; });
    h+='</tbody></table>'; document.getElementById('list').innerHTML=h;
    document.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ if(!confirm('Aufgabe löschen?'))return; j(API+'/jobs/'+b.getAttribute('data-del'),{method:'DELETE'}).then(function(){msg('Gelöscht.');load();}).catch(function(e){msg(e.message,true);}); }; });
  }).catch(function(e){ document.getElementById('list').innerHTML='<div style="color:var(--color-error)">'+esc(e.message)+'</div>'; }); }
  document.getElementById('preset').onchange=function(){ if(this.value)document.getElementById('sched').value=this.value; };
  document.getElementById('add').onclick=function(){ var schedule=document.getElementById('sched').value.trim(),command=document.getElementById('cmd').value.trim(),comment=document.getElementById('cmt').value.trim(); if(!schedule||!command){msg('Zeitplan und Befehl nötig.',true);return;}
    j(API+'/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schedule:schedule,command:command,comment:comment})}).then(function(){msg('Aufgabe hinzugefügt.');document.getElementById('cmd').value='';document.getElementById('cmt').value='';load();}).catch(function(e){msg(e.message,true);}); };
  document.getElementById('save-raw').onclick=function(){ if(!confirm('Komplette crontab überschreiben?'))return; j(API+'/raw',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw:document.getElementById('raw').value})}).then(function(){msg('crontab gespeichert.');load();}).catch(function(e){msg(e.message,true);}); };
  load();
})();
</script>
</body>
</html>
