<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paketverwaltung</title>
<link rel="stylesheet" href="/plugin-kit.css" />
<style>.search{flex:1;min-width:200px}th{position:sticky;top:0;background:var(--color-surface)}</style>
</head>
<body>
<div class="tabs"><button class="tab on" id="t-inst">Installiert</button><button class="tab" id="t-search">Suchen & Installieren</button></div>
<div class="msg" id="msg"></div>
<div class="toolbar" id="bar-inst"><input class="search" id="filter" placeholder="Installierte Pakete filtern…" /><label style="display:flex;align-items:center;gap:6px;color:var(--color-muted)"><input type="checkbox" id="onlymanual" style="width:auto"/> nur manuell installierte</label><span class="muted" id="count"></span></div>
<div class="toolbar" id="bar-search" style="display:none"><input class="search" id="query" placeholder="Paket suchen (min. 2 Zeichen)…" /><button class="btn primary" id="dosearch">Suchen</button></div>
<div class="card" style="padding:0"><div class="scroll" id="content"><div class="muted" style="padding:24px">Lade…</div></div></div>
<div class="overlay" id="overlay"><div class="modal"><div class="mh"><b>Ausgabe</b><button class="btn sm" id="mx">Schließen</button></div><pre id="out"></pre></div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var tab='inst',installed=[],busy=false;
  var content=document.getElementById('content'),msgEl=document.getElementById('msg'),overlay=document.getElementById('overlay'),outEl=document.getElementById('out'),
      filter=document.getElementById('filter'),onlymanual=document.getElementById('onlymanual'),countEl=document.getElementById('count');
  var API='/app/packages/api';
  function msg(t,err){ msgEl.className='msg'+(t?' show '+(err?'err':'ok'):''); msgEl.textContent=t||''; }
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function fmtBytes(n){if(!n)return '';var u=['B','KB','MB','GB'],i=0;while(n>=1024&&i<3){n/=1024;i++;}return n.toFixed(n<10&&i>0?1:0)+' '+u[i];}
  function j(url,opts){ return fetch(url,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().catch(function(){return{};}).then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function POST(p,b){ return j(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); }
  function renderInstalled(){
    var q=filter.value.toLowerCase(),man=onlymanual.checked;
    var rows=installed.filter(function(p){ return (!man||!p.auto)&&(!q||(p.name+' '+p.summary).toLowerCase().indexOf(q)>=0); });
    countEl.textContent=rows.length+' / '+installed.length+' Pakete';
    var shown=rows.slice(0,300);
    var h='<table><thead><tr><th>Paket</th><th>Version</th><th class="num">Größe</th><th>Beschreibung</th><th></th></tr></thead><tbody>';
    shown.forEach(function(p){ h+='<tr><td><b>'+esc(p.name)+'</b>'+(p.auto?' <span class="badge">auto</span>':'')+'</td><td class="mono muted">'+esc(p.version)+'</td><td class="num mono">'+fmtBytes(p.size)+'</td><td class="wrap muted">'+esc(p.summary)+'</td><td class="num"><button class="btn xs danger" data-rm="'+esc(p.name)+'">Entfernen</button></td></tr>'; });
    h+='</tbody></table>'; if(rows.length>300)h+='<div class="muted" style="padding:10px 12px">… '+(rows.length-300)+' weitere – Filter verfeinern.</div>';
    content.innerHTML=h;
    content.querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ var n=b.getAttribute('data-rm'); var purge=confirm('"'+n+'" entfernen?\n\nOK = mit Konfiguration (purge)\nAbbrechen = normal'); doApply('/remove',{packages:[n],purge:purge},b); }; });
  }
  function doApply(path,body,btn){ if(busy)return; busy=true; if(btn)btn.disabled=true; overlay.className='overlay show'; outEl.textContent='› wird ausgeführt …';
    POST(path,body).then(function(d){ outEl.textContent=(d.output||'(keine Ausgabe)').trim(); load(); }).catch(function(e){ outEl.textContent='[Fehler] '+e.message; }).finally(function(){ busy=false; }); }
  function load(){ j(API+'/installed').then(function(d){ installed=d.packages||[]; if(tab==='inst')renderInstalled(); }).catch(function(e){ msg(e.message,true); }); }
  function doSearch(){ var q=document.getElementById('query').value.trim();
    if(q.length<2){content.innerHTML='<div class="muted" style="padding:24px">Mindestens 2 Zeichen.</div>';return;}
    content.innerHTML='<div class="muted" style="padding:24px">Suche…</div>';
    j(API+'/search?q='+encodeURIComponent(q)).then(function(d){
      var h='<table><thead><tr><th>Paket</th><th>Beschreibung</th><th></th></tr></thead><tbody>';
      (d.results||[]).forEach(function(r){ h+='<tr><td><b>'+esc(r.name)+'</b></td><td class="wrap muted">'+esc(r.summary)+'</td><td class="num">'+(r.installed?'<span class="badge">installiert</span>':'<button class="btn primary xs" data-inst="'+esc(r.name)+'">Installieren</button>')+'</td></tr>'; });
      h+='</tbody></table>'; if(!(d.results||[]).length)h='<div class="muted" style="padding:24px">Keine Treffer.</div>';
      content.innerHTML=h;
      content.querySelectorAll('[data-inst]').forEach(function(b){ b.onclick=function(){ doApply('/install',{packages:[b.getAttribute('data-inst')]},b); }; });
    }).catch(function(e){ msg(e.message,true); }); }
  function setTab(t){ tab=t;
    document.getElementById('t-inst').className='tab'+(t==='inst'?' on':'');
    document.getElementById('t-search').className='tab'+(t==='search'?' on':'');
    document.getElementById('bar-inst').style.display=t==='inst'?'flex':'none';
    document.getElementById('bar-search').style.display=t==='search'?'flex':'none';
    if(t==='inst')renderInstalled(); else content.innerHTML='<div class="muted" style="padding:24px">Suchbegriff eingeben…</div>';
  }
  document.getElementById('mx').onclick=function(){ overlay.className='overlay'; };
  document.getElementById('t-inst').onclick=function(){setTab('inst');};
  document.getElementById('t-search').onclick=function(){setTab('search');};
  filter.oninput=renderInstalled; onlymanual.onchange=renderInstalled;
  document.getElementById('dosearch').onclick=doSearch;
  document.getElementById('query').addEventListener('keydown',function(e){ if(e.key==='Enter')doSearch(); });
  load();
})();
</script>
</body>
</html>
