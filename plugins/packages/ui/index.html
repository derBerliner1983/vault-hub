<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paketverwaltung</title>
<style>
  :root{--bg:#1C1C1F;--surface:#26262B;--sunken:#18181B;--fg:#F4F4F5;--muted:#A1A1AA;--faint:#52525B;--border:rgba(255,255,255,.08);--accent:#34D399;--err:#F87171;--hover:rgba(255,255,255,.04)}
  :root[data-theme="light"]{--bg:#F7F7F8;--surface:#FFF;--sunken:#F1F1F3;--fg:#0B0B0F;--muted:#52525B;--faint:#A1A1AA;--border:rgba(0,0,0,.08);--accent:#10B981;--err:#DC2626;--hover:rgba(0,0,0,.03)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,ui-sans-serif,system-ui,sans-serif;padding:16px;font-size:13px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .tab{padding:8px 14px;cursor:pointer;color:var(--muted);border:0;border-bottom:2px solid transparent;background:none;font:inherit}
  .tab.on{color:var(--fg);font-weight:600;border-bottom-color:var(--accent)}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  input{font:inherit;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--sunken);color:var(--fg)}
  .search{flex:1;min-width:200px}
  .btn{font:inherit;font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--fg);cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#052E20;font-weight:600}
  .btn.sm{padding:4px 10px;font-size:12px}
  .btn.danger{color:var(--err);border-color:transparent}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .scroll{max-height:calc(100vh - 150px);overflow:auto}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:500;font-size:12px;position:sticky;top:0;background:var(--surface)}
  tr:hover td{background:var(--hover)}
  .mono{font-family:ui-monospace,monospace;color:var(--muted)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{padding:1px 8px;border-radius:999px;font-size:11px;background:rgba(255,255,255,.08);color:var(--muted)}
  .muted{color:var(--faint)}
  label.ck{display:flex;align-items:center;gap:6px;color:var(--muted)}
  #msg{display:none;margin-bottom:12px;padding:8px 12px;border-radius:8px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(760px,100%);max-height:85vh;display:flex;flex-direction:column}
  .modal .mh{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
  .modal .mh b{flex:1}
  pre{margin:16px;background:var(--sunken);border-radius:10px;padding:14px;font-size:12px;overflow:auto;white-space:pre-wrap;flex:1}
</style>
</head>
<body>
<div class="tabs"><button class="tab on" id="t-inst">Installiert</button><button class="tab" id="t-search">Suchen & Installieren</button></div>
<div id="msg"></div>
<div class="bar" id="bar-inst">
  <input class="search" id="filter" placeholder="Installierte Pakete filtern…" />
  <label class="ck"><input type="checkbox" id="onlymanual"/> nur manuell installierte</label>
  <span class="muted" id="count"></span>
</div>
<div class="bar" id="bar-search" style="display:none">
  <input class="search" id="query" placeholder="Paket suchen (min. 2 Zeichen)…" />
  <button class="btn primary" id="dosearch">Suchen</button>
</div>
<div class="card"><div class="scroll" id="content"><div style="padding:24px" class="muted">Lade…</div></div></div>

<div class="overlay" id="overlay">
  <div class="modal"><div class="mh"><b>Ausgabe</b><button class="btn sm" id="mx">Schließen</button></div><pre id="out"></pre></div>
</div>

<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var tab='inst',installed=[],busy=false;
  var content=document.getElementById('content'),msgEl=document.getElementById('msg'),
      overlay=document.getElementById('overlay'),outEl=document.getElementById('out'),
      filter=document.getElementById('filter'),onlymanual=document.getElementById('onlymanual'),countEl=document.getElementById('count');
  var API='/app/packages/api';
  function msg(t,err){ msgEl.style.display=t?'block':'none'; msgEl.textContent=t||''; msgEl.style.background=err?'rgba(248,113,113,.15)':'rgba(52,211,153,.15)'; msgEl.style.color=err?'var(--err)':'var(--accent)'; }
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function fmtBytes(n){if(!n)return '';var u=['B','KB','MB','GB'],i=0;while(n>=1024&&i<3){n/=1024;i++;}return n.toFixed(n<10&&i>0?1:0)+' '+u[i];}
  function j(url,opts){ return fetch(url,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().catch(function(){return{};}).then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function POST(p,b){ return j(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); }
  function showOut(text){ overlay.style.display='flex'; outEl.textContent=text; }
  document.getElementById('mx').onclick=function(){ overlay.style.display='none'; };

  function renderInstalled(){
    var q=filter.value.toLowerCase(),man=onlymanual.checked;
    var rows=installed.filter(function(p){ return (!man||!p.auto)&&(!q||(p.name+' '+p.summary).toLowerCase().indexOf(q)>=0); });
    countEl.textContent=rows.length+' / '+installed.length+' Pakete';
    var shown=rows.slice(0,300);
    var h='<table><thead><tr><th>Paket</th><th>Version</th><th class="num">Größe</th><th>Beschreibung</th><th></th></tr></thead><tbody>';
    shown.forEach(function(p){
      h+='<tr><td><b>'+esc(p.name)+'</b>'+(p.auto?' <span class="badge">auto</span>':'')+'</td><td class="mono">'+esc(p.version)+'</td>'
        +'<td class="num mono">'+fmtBytes(p.size)+'</td><td class="muted">'+esc(p.summary)+'</td>'
        +'<td style="text-align:right"><button class="btn sm danger" data-rm="'+esc(p.name)+'">Entfernen</button></td></tr>';
    });
    h+='</tbody></table>'; if(rows.length>300)h+='<div class="muted" style="padding:10px 12px">… '+(rows.length-300)+' weitere – Filter verfeinern.</div>';
    content.innerHTML=h;
    content.querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ var n=b.getAttribute('data-rm'); var purge=confirm('"'+n+'" entfernen?\n\nOK = mit Konfiguration löschen (purge)\nAbbrechen-danach-Bestätigen = normal entfernen'); doApply('/remove',{packages:[n],purge:purge},b); }; });
  }
  function doApply(path,body,btn){
    if(busy)return; busy=true; if(btn)btn.disabled=true; showOut('› wird ausgeführt …');
    POST(path,body).then(function(d){ outEl.textContent=(d.output||'(keine Ausgabe)').trim(); load(); })
      .catch(function(e){ outEl.textContent='[Fehler] '+e.message; }).finally(function(){ busy=false; });
  }
  function load(){ j(API+'/installed').then(function(d){ installed=d.packages||[]; if(tab==='inst')renderInstalled(); }).catch(function(e){ msg(e.message,true); }); }

  function doSearch(){
    var q=document.getElementById('query').value.trim();
    if(q.length<2){content.innerHTML='<div class="muted" style="padding:24px">Mindestens 2 Zeichen eingeben.</div>';return;}
    content.innerHTML='<div class="muted" style="padding:24px">Suche…</div>';
    j(API+'/search?q='+encodeURIComponent(q)).then(function(d){
      var h='<table><thead><tr><th>Paket</th><th>Beschreibung</th><th></th></tr></thead><tbody>';
      (d.results||[]).forEach(function(r){
        h+='<tr><td><b>'+esc(r.name)+'</b></td><td class="muted">'+esc(r.summary)+'</td>'
          +'<td style="text-align:right">'+(r.installed?'<span class="badge">installiert</span>':'<button class="btn primary sm" data-inst="'+esc(r.name)+'">Installieren</button>')+'</td></tr>';
      });
      h+='</tbody></table>'; if(!(d.results||[]).length)h='<div class="muted" style="padding:24px">Keine Treffer.</div>';
      content.innerHTML=h;
      content.querySelectorAll('[data-inst]').forEach(function(b){ b.onclick=function(){ doApply('/install',{packages:[b.getAttribute('data-inst')]},b); }; });
    }).catch(function(e){ msg(e.message,true); });
  }

  function setTab(t){
    tab=t;
    document.getElementById('t-inst').className='tab'+(t==='inst'?' on':'');
    document.getElementById('t-search').className='tab'+(t==='search'?' on':'');
    document.getElementById('bar-inst').style.display=t==='inst'?'flex':'none';
    document.getElementById('bar-search').style.display=t==='search'?'flex':'none';
    if(t==='inst')renderInstalled(); else content.innerHTML='<div class="muted" style="padding:24px">Suchbegriff eingeben…</div>';
  }
  document.getElementById('t-inst').onclick=function(){setTab('inst');};
  document.getElementById('t-search').onclick=function(){setTab('search');};
  filter.oninput=renderInstalled; onlymanual.onchange=renderInstalled;
  document.getElementById('dosearch').onclick=doSearch;
  document.getElementById('query').addEventListener('keydown',function(e){ if(e.key==='Enter')doSearch(); });
  load();
})();
</script>
</body>
</html>
