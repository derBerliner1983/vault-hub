<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>System-Updates</title>
<link rel="stylesheet" href="/plugin-kit.css" />
<style>.new{color:var(--color-accent);font-weight:600}.reboot{margin:12px 0;padding:10px 14px;border-radius:12px;background:rgba(251,191,36,.12);color:var(--color-warning);font-size:13px;display:none}</style>
</head>
<body>
<div class="toolbar">
  <div><div class="page-title">System-Updates</div><div class="page-subtitle" id="pm">Paketmanager: …</div></div>
  <div class="spacer"></div>
  <button class="btn" id="check">Nach Updates suchen</button>
  <button class="btn primary" id="all" style="display:none">Alle installieren</button>
</div>
<div class="reboot" id="reboot">Ein Neustart des Servers ist erforderlich, um alle Updates abzuschließen.</div>
<div id="content"><div class="empty">Lade…</div></div>
<div class="overlay" id="overlay"><div class="modal"><div class="mh"><b>Update-Ausgabe</b><button class="btn sm" id="mx">Schließen</button></div><pre id="out"></pre><div style="padding:0 16px 14px;text-align:right;color:var(--color-accent);font-size:13px;display:none" id="done">✓ Fertig – Fenster schließt automatisch…</div></div></div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  document.documentElement.setAttribute('data-theme',(params.get('theme')||'dark')==='light'?'light':'dark');
  var content=document.getElementById('content'),pmEl=document.getElementById('pm'),allBtn=document.getElementById('all'),
      rebootEl=document.getElementById('reboot'),overlay=document.getElementById('overlay'),outEl=document.getElementById('out'),doneEl=document.getElementById('done');
  var updates=[],busy=false;
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function api(p,opts){ return fetch('/app/system-updates/api/'+p,Object.assign({credentials:'include'},opts||{})).then(function(r){return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d; });}); }
  function POST(p,b){ return api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}); }
  function render(){
    if(!updates.length){ content.innerHTML='<div class="card"><div class="empty"><div class="title">System ist aktuell</div><div>Keine Updates verfügbar.</div></div></div>'; allBtn.style.display='none'; return; }
    allBtn.style.display=''; allBtn.textContent='Alle installieren ('+updates.length+')';
    var h='<div class="card" style="padding:0"><div class="card-header" style="padding:14px 16px;margin:0;border-bottom:1px solid var(--color-border)">Verfügbare Updates · '+updates.length+' Paket(e)</div><table><thead><tr><th>Paket</th><th>Aktuell</th><th>Neu</th><th>Quelle</th><th></th></tr></thead><tbody>';
    updates.forEach(function(u){ h+='<tr><td><b>'+esc(u.name)+'</b></td><td class="mono muted">'+esc(u.currentVersion||'–')+'</td><td class="new mono">'+esc(u.newVersion)+'</td><td class="muted">'+esc(u.repo||'')+'</td><td class="num"><button class="btn sm" data-pkg="'+esc(u.name)+'">Update</button></td></tr>'; });
    h+='</tbody></table></div>'; content.innerHTML=h;
    content.querySelectorAll('[data-pkg]').forEach(function(b){ b.onclick=function(){ apply([b.getAttribute('data-pkg')]); }; });
  }
  function load(){ api('list').then(function(d){ pmEl.textContent='Paketmanager: '+(d.manager||'—'); updates=d.updates||[]; rebootEl.style.display=d.rebootRequired?'block':'none'; render(); }).catch(function(e){ content.innerHTML='<div class="card"><div class="empty" style="color:var(--color-error)">'+esc(e.message)+'</div></div>'; }); }
  function apply(pkgs){ if(busy)return; busy=true; overlay.className='overlay show'; outEl.textContent='› Update wird ausgeführt …\n'; doneEl.style.display='none';
    POST('apply',{packages:pkgs}).then(function(d){ outEl.textContent=(d.output||'(keine Ausgabe)').trim(); doneEl.style.display='block'; setTimeout(function(){ overlay.className='overlay'; load(); },3500); }).catch(function(e){ outEl.textContent+='\n[Fehler] '+e.message; }).finally(function(){ busy=false; }); }
  document.getElementById('mx').onclick=function(){ overlay.className='overlay'; };
  document.getElementById('all').onclick=function(){ apply([]); };
  document.getElementById('check').onclick=function(){ if(busy)return; busy=true; var b=this; b.disabled=true; b.textContent='Suche …'; POST('check').then(function(){ load(); }).catch(function(e){ alert(e.message); }).finally(function(){ busy=false; b.disabled=false; b.textContent='Nach Updates suchen'; }); };
  load();
})();
</script>
</body>
</html>
